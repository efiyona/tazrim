<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טסט תפריט ניווט תחתון צף - גרסה 4 (מושלמת)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f3f4f6;       
            --nav-bg: #ffffff;         
            --main-color: #29b669;     
            --text-color: #666666;
            --income-color: #237227;   
            --expense-color: #dc2626;  
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Assistant', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            min-height: 100vh;
            background: var(--bg-color);
            padding-bottom: 25px; 
        }

        .floating-nav-wrapper {
            position: fixed;
            bottom: 25px;
            display: flex;
            align-items: flex-end; 
            gap: 12px; 
            z-index: 100;
            max-width: 92vw; 
        }

        /* =========================================
           כפתור הפלוס המנותק (עכשיו מימין!)
        ========================================= */
        .detached-plus-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plus-btn-detached {
            width: 55px; 
            height: 55px;
            background: var(--main-color);
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            box-shadow: 0 6px 15px rgba(35,114,39,0.25);
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 2px; 
        }

        .detached-plus-wrapper.open .plus-btn-detached {
            transform: scale(0.9) rotate(45deg); 
            background: #888; 
            box-shadow: none;
        }

        /* =========================================
           הבר הראשי (עכשיו משמאל!)
        ========================================= */
        .bottom-nav-bar {
            background: var(--nav-bg);
            height: 60px; 
            border-radius: 35px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
            padding: 0 10px; 
            display: flex;
            align-items: center;
        }

        .bottom-nav-bar ul {
            display: flex;
            position: relative; 
            list-style: none;
        }

        .bottom-nav-bar ul li.list {
            position: relative;
            width: 60px; 
            height: 60px;
            z-index: 1;
        }

        .bottom-nav-bar ul li.list > a {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
            height: 100%;
            text-align: center;
            font-weight: 500;
            text-decoration: none;
        }

        .bottom-nav-bar ul li.list > a .icon {
            position: relative;
            display: block;
            line-height: 60px; 
            font-size: 1.25rem; 
            text-align: center;
            transition: 0.5s;
            color: var(--text-color);
        }

        /* קפיצת האייקון למעלה כשהוא פעיל */
        .bottom-nav-bar ul li.list.active > a .icon {
            transform: translateY(-30px); 
            color: #fff;
        }

        /* --- התיקון שהוספנו: חיווי ויזואלי להגדרות כשהבועה פתוחה --- */
        /* כשהכפתור פתוח אבל לא העמוד הנוכחי - נצבע בירוק ומסתובב */
        .bottom-nav-bar ul li.list.show-submenu:not(.active) > a .icon {
            color: var(--main-color);
            transform: rotate(90deg);
        }
        .bottom-nav-bar ul li.list.show-submenu:not(.active) > a .text {
            color: var(--main-color);
        }
        /* כשהכפתור גם העמוד הנוכחי וגם פתוח - שומר על הקפיצה ומוסיף סיבוב */
        .bottom-nav-bar ul li.list.active.show-submenu > a .icon {
            transform: translateY(-30px) rotate(90deg);
        }
        /* ------------------------------------------------------------- */

        .bottom-nav-bar ul li.list > a .text {
            position: absolute;
            color: var(--text-color);
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.02em;
            transition: 0.5s;
            opacity: 0;
            transform: translateY(20px);
        }

        .bottom-nav-bar ul li.list.active > a .text {
            opacity: 1;
            transform: translateY(10px);
            color: var(--main-color);
        }

        /* האינדיקטור */
        .indicator {
            position: absolute;
            top: -30px; 
            right: 0; 
            width: 60px; 
            height: 60px;
            background: var(--main-color);
            border-radius: 50%;
            border: 6px solid var(--bg-color); 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 0;
        }

        .indicator::before {
            content: '';
            position: absolute;
            top: 50%; left: -22px;
            width: 20px; height: 20px;
            background: transparent;
            border-top-right-radius: 20px;
            box-shadow: 1px -10px 0 0 var(--bg-color);
        }

        .indicator::after {
            content: '';
            position: absolute;
            top: 50%; right: -22px;
            width: 20px; height: 20px;
            background: transparent;
            border-top-left-radius: 20px;
            box-shadow: -1px -10px 0 0 var(--bg-color);
        }

        .bottom-nav-bar ul li.list:nth-child(1).active ~ .indicator { transform: translateX(0); }
        .bottom-nav-bar ul li.list:nth-child(2).active ~ .indicator { transform: translateX(-60px); }
        .bottom-nav-bar ul li.list:nth-child(3).active ~ .indicator { transform: translateX(-120px); }
        .bottom-nav-bar ul li.list:nth-child(4).active ~ .indicator { transform: translateX(-180px); }

        /* =========================================
           מכלול הבועות הקופצות (אחיד)
        ========================================= */
        .submenu-popup-container {
            display: flex;
            flex-direction: column; 
            gap: 8px;
            position: absolute;
            right: 50%; 
            transform: translateX(50%) translateY(20px);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .plus-submenu { bottom: 70px; }
        .settings-submenu { bottom: 75px; }

        .detached-plus-wrapper.open .plus-submenu,
        .bottom-nav-bar ul li.list.show-submenu .settings-submenu {
            opacity: 1;
            visibility: visible;
            transform: translateX(50%) translateY(0);
        }

        .submenu-action-btn {
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: flex-start;
            padding: 0 15px 0 20px; 
            gap: 12px;
            width: max-content; 
            min-width: 120px; 
            height: 45px; 
            border-radius: 25px; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            text-decoration: none;
            color: var(--text-color);
            font-weight: 700;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.5);
            transition: 0.2s;
            white-space: nowrap; 
        }

        .submenu-action-btn i { 
            font-size: 1.1rem; 
            width: 20px; 
            text-align: center;
        }

        .submenu-action-btn:hover {
            transform: translateX(-3px);
            color: var(--main-color);
            border-color: var(--main-color);
        }

        .submenu-action-btn.expense-btn { color: var(--expense-color); }
        .submenu-action-btn.expense-btn:hover { border-color: var(--expense-color); background: #fee2e2; }
        
        .submenu-action-btn.income-btn { color: var(--main-color); } 
        .submenu-action-btn.income-btn:hover { background: #f0fdf4; }

    </style>
</head>
<body>

    <div class="floating-nav-wrapper">
        
        <div class="detached-plus-wrapper" id="plusMenuWrapper">
            <div class="plus-btn-detached" onclick="togglePlusMenu()">
                <i class="fa-solid fa-plus"></i>
            </div>
            
            <div class="submenu-popup-container plus-submenu">
                <a href="#add-expense" class="submenu-action-btn expense-btn" onclick="closeAllMenus()">
                    <i class="fa-solid fa-minus-circle"></i> הוצאה
                </a>
                <a href="#add-income" class="submenu-action-btn income-btn" onclick="closeAllMenus()">
                    <i class="fa-solid fa-plus-circle"></i> הכנסה
                </a>
            </div>
        </div>

        <div class="bottom-nav-bar">
            <ul>
                <li class="list active" id="navHome">
                    <a href="#home">
                        <span class="icon"><i class="fa-solid fa-house"></i></span>
                        <span class="text">ראשי</span>
                    </a>
                </li>
                <li class="list" id="navReports">
                    <a href="#reports">
                        <span class="icon"><i class="fa-solid fa-chart-pie"></i></span>
                        <span class="text">דוחות</span>
                    </a>
                </li>
                <li class="list" id="navBudget">
                    <a href="#budget">
                        <span class="icon"><i class="fa-solid fa-wallet"></i></span>
                        <span class="text">תקציב</span>
                    </a>
                </li>
                
                <li class="list has-submenu" id="navSettings">
                    <a href="javascript:void(0);">
                        <span class="icon"><i class="fa-solid fa-gear"></i></span>
                        <span class="text">הגדרות</span>
                    </a>
                    
                    <div class="submenu-popup-container settings-submenu">
                        <a href="#manage-home" class="submenu-action-btn sim-settings-click">
                            <i class="fa-solid fa-house-user"></i> ניהול הבית
                        </a>
                        <a href="#profile" class="submenu-action-btn sim-settings-click">
                            <i class="fa-solid fa-user-gear"></i> פרופיל שלי
                        </a>
                    </div>
                </li>

                <div class="indicator"></div>
            </ul>
        </div>

    </div>

    <script>
        const listItems = document.querySelectorAll('.bottom-nav-bar .list');
        let lastActiveNav = document.getElementById('navHome');

        function closeAllMenus() {
            document.querySelectorAll('.has-submenu').forEach(li => {
                li.classList.remove('show-submenu');
            });
            document.getElementById('plusMenuWrapper').classList.remove('open');
        }

        document.querySelectorAll('.sim-settings-click').forEach(btn => {
            btn.addEventListener('click', function(e) {
                closeAllMenus();
                listItems.forEach(li => li.classList.remove('active'));
                
                const settingsTab = document.getElementById('navSettings');
                settingsTab.classList.add('active');
                lastActiveNav = settingsTab;
            });
        });

        listItems.forEach((item) => {
            item.addEventListener('click', function(e) {
                if (e.target.closest('.submenu-popup-container')) return;

                const hasSubmenu = this.classList.contains('has-submenu');
                
                document.getElementById('plusMenuWrapper').classList.remove('open');

                if (hasSubmenu) {
                    this.classList.toggle('show-submenu');
                } else {
                    closeAllMenus();
                    listItems.forEach(li => li.classList.remove('active'));
                    this.classList.add('active');
                    lastActiveNav = this; 
                }
            });
        });

        function togglePlusMenu() {
            const plusWrapper = document.getElementById('plusMenuWrapper');
            const isOpened = plusWrapper.classList.contains('open');
            
            document.querySelectorAll('.has-submenu').forEach(li => {
                li.classList.remove('show-submenu');
            });

            if (!isOpened) {
                plusWrapper.classList.add('open');
            } else {
                plusWrapper.classList.remove('open');
            }
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.floating-nav-wrapper')) {
                closeAllMenus();
            }
        });
    </script>

</body>
</html>
